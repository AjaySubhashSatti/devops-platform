name: Advanced CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    steps:

    # Checkout code
    - name: Checkout
      uses: actions/checkout@v3

    # Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # Install dependencies
    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt
        pip install flake8

    # Lint code
    - name: Lint Code
      run: |
        flake8 app/

    # Run application test
    - name: Run App Test
      run: |
        python app/app.py &
        sleep 5
        curl http://localhost:5000/health

    # Login to Docker Hub
    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Build Docker Image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-platform:latest -f docker/Dockerfile .

    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    # Scan Docker Image
    - name: Scan Image
      run: |
        trivy image ${{ secrets.DOCKER_USERNAME }}/devops-platform:latest

    # Push Docker Image
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-platform:latest